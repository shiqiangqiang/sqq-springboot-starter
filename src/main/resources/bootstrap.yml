spring:
  application:
    name: sqq-springboot-starter
  cloud:
    bootstrap:
      enabled: true  # 开启 Bootstrap 支持
    nacos:
      config:
        server-addr: 101.132.78.113:8848
        username: nacos
        password: nacos~~~123
        # 选择环境，本地开发写 dev，部署到 stg 改成 stg
        namespace: stg
        group: DEFAULT_GROUP
        file-extension: yaml  # 必须加上这一行！
        # 主配置文件，DataID 必须和服务名一致
        data-id: sqq-springboot-starter.yaml
        # 引入共享的数据库配置
        extension-configs:
          - data-id: sqq-springboot-starter-db.yaml
            group: DEFAULT_GROUP
            refresh: true # 开启动态刷新（需配合@RefreshScope）
      discovery:
        server-addr: 101.132.78.113:8848  # 注册中心地址也要配置
        username: nacos
        password: nacos~~~123